<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Quiz Rambu Lalu Lintas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #4facfe, #8ec5fc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI';
        }

        .main-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border-top: 6px solid #0d6efd;
        }

        .start-form {
            background: #f8fbff;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #e3ecff;
        }

        .btn-blue {
            background: linear-gradient(45deg, #0d6efd, #4facfe);
            color: white;
            border: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-blue:hover {
            transform: scale(1.03);
        }

        .btn-option {
            width: 100%;
            margin-bottom: 10px;
            border-radius: 12px;
            padding: 12px;
            border: 2px solid #dee2e6;
            background: #f8f9fa;
            transition: 0.2s;
        }

        .btn-option:hover {
            background: #e7f1ff;
            border-color: #0d6efd;
            transform: scale(1.02);
        }

        .correct {
            background: #198754 !important;
            color: white !important;
            border-color: #198754 !important;
        }

        .wrong {
            background: #dc3545 !important;
            color: white !important;
            border-color: #dc3545 !important;
        }

        .soal-img {
            max-height: 200px;
            object-fit: contain;
            display: block;
            margin: auto;
            margin-bottom: 15px;
            background: #f8fbff;
            padding: 15px;
            border-radius: 12px;
            border: 2px dashed #0d6efd;
        }

        .progress {
            height: 8px;
            border-radius: 10px;
        }

        .progress-bar {
            background: linear-gradient(90deg, #0d6efd, #4facfe);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="main-card shadow">

                    <!-- START -->
                    <div id="startBox">

                        <h3 class="text-center mb-4 text-primary">Quiz Rambu Lalu Lintas</h3>

                        <div class="start-form">

                            <div class="mb-3">
                                <label>Nama</label>
                                <input type="text" id="nama" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label>Kelas</label>
                                <input type="text" id="kelas" class="form-control">
                            </div>

                            <button class="btn btn-blue w-100" onclick="mulaiQuiz()">Mulai Quiz</button>

                        </div>
                    </div>

                    <!-- QUIZ -->
                    <div id="quizBox" class="d-none">

                        <div class="d-flex justify-content-between mb-2">
                            <span id="progress"></span>
                            <span id="score"></span>
                        </div>

                        <div class="progress mb-3">
                            <div id="progressBar" class="progress-bar"></div>
                        </div>

                        <img id="gambarSoal" class="img-fluid soal-img">

                        <h5 id="soal"></h5>

                        <div id="jawaban"></div>

                        <button id="nextBtn" class="btn btn-blue w-100 mt-3 d-none" onclick="nextSoal()">Soal
                            Berikutnya</button>

                    </div>

                    <!-- HASIL -->
                    <div id="hasilBox" class="d-none text-center">

                        <h4 class="text-primary">Quiz Selesai 🎉</h4>

                        <div class="alert alert-info mt-3">
                            <p id="hasilText"></p>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>

        // SOUND
        const soundBenar = new Audio("correct.mpeg")
        const soundSalah = new Audio("wrong.mpeg")
        const soundFinish = new Audio("done.mpeg")

        // DATA SOAL
        const soalData = [

            {
                gambar: "1.PNG",
                pertanyaan: "Jika rambu tersebut terpasang di sebuah jalan, tindakan yang tepat adalah …",
                pilihan: [
                    "Kendaraan boleh masuk dengan hati-hati",
                    "Kendaraan wajib berhenti sebentar",
                    "Kendaraan dilarang masuk",
                    "Kendaraan harus berputar arah"
                ],
                benar: "Kendaraan dilarang masuk"
            },

            {
                gambar: "2.PNG",
                pertanyaan: "Apa konsekuensi jika pengendara melanggar rambu tersebut?",
                pilihan: [
                    "Kendaraan mendapat prioritas",
                    "Kendaraan dapat dikenai sanksi atau denda",
                    "Kendaraan boleh berhenti lama",
                    "Kendaraan wajib menyalakan lampu"
                ],
                benar: "Kendaraan dapat dikenai sanksi atau denda"
            },

            {
                gambar: "3.PNG",
                pertanyaan: "Sikap yang tepat ketika melihat rambu tersebut adalah …",
                pilihan: [
                    "Menambah kecepatan",
                    "Mengurangi kecepatan dan waspada",
                    "Berhenti di tengah jalan",
                    "Membunyikan klakson terus-menerus"
                ],
                benar: "Mengurangi kecepatan dan waspada"
            },

            {
                gambar: "4.PNG",
                pertanyaan: "Mengapa pengendara perlu berhati-hati pada jalan tersebut?",
                pilihan: [
                    "Karena jalannya lebar",
                    "Karena jalan berpotensi menyebabkan kendaraan tergelincir",
                    "Karena banyak pohon",
                    "Karena jalannya lurus"
                ],
                benar: "Karena jalan berpotensi menyebabkan kendaraan tergelincir"
            },

            {
                gambar: "5.PNG",
                pertanyaan: "Rambu tersebut menunjukkan bahwa pengendara …",
                pilihan: [
                    "Boleh lurus atau kiri",
                    "Wajib belok kiri",
                    "Dilarang belok kiri",
                    "Bebas memilih arah"
                ],
                benar: "Wajib belok kiri"
            },

            {
                gambar: "6.PNG",
                pertanyaan: "Mengapa jalur sepeda perlu dipisahkan dari kendaraan bermotor?",
                pilihan: [
                    "Agar sepeda lebih cepat",
                    "Agar keamanan dan kenyamanan pesepeda terjaga",
                    "Agar jalan terlihat indah",
                    "Agar kendaraan bermotor berhenti"
                ],
                benar: "Agar keamanan dan kenyamanan pesepeda terjaga"
            },

            {
                gambar: "7.JPEG",
                pertanyaan: "Fungsi utama rambu tersebut adalah …",
                pilihan: [
                    "Memberikan larangan",
                    "Memberikan peringatan bahaya",
                    "Memberikan informasi arah atau lokasi",
                    "Memberikan perintah wajib"
                ],
                benar: "Memberikan informasi arah atau lokasi"
            },

            {
                gambar: "8.PNG",
                pertanyaan: "Jika di lingkungan sekolah belum tersedia rambu tersebut, dampak yang mungkin terjadi adalah …",
                pilihan: [
                    "Peserta didik dapat naik turun kendaraan dengan tertib",
                    "Kendaraan berhenti sembarangan sehingga menimbulkan kemacetan",
                    "Lalu lintas menjadi lebih lancar",
                    "Pengendara menjadi lebih cepat sampai tujuan"
                ],
                benar: "Kendaraan berhenti sembarangan sehingga menimbulkan kemacetan"
            },

            {
                gambar: "9.PNG",
                pertanyaan: "Jika lampu berwarna merah menyala, tindakan yang benar adalah …",
                pilihan: [
                    "Tetap melaju pelan",
                    "Berhenti di belakang garis",
                    "Membelok tanpa berhenti",
                    "Mempercepat kendaraan"
                ],
                benar: "Berhenti di belakang garis"
            },

            {
                gambar: "10.PNG",
                pertanyaan: "Jika di daerah sekolah belum terdapat rambu tersebut, solusi yang dapat kamu usulkan adalah …",
                pilihan: [
                    "Membiarkan saja",
                    "Mengusulkan pemasangan rambu kepada pihak berwenang",
                    "Mengabaikan aturan",
                    "Menghapus marka jalan"
                ],
                benar: "Mengusulkan pemasangan rambu kepada pihak berwenang"
            }

        ]

        let indexSoal = 0
        let skorBenar = 0
        let skorSalah = 0
        let namaSiswa = ""
        let kelasSiswa = ""

        // START
        function mulaiQuiz() {

            namaSiswa = document.getElementById("nama").value
            kelasSiswa = document.getElementById("kelas").value

            if (namaSiswa == "" || kelasSiswa == "") {
                alert("Isi nama dan kelas dulu!")
                return
            }

            document.getElementById("startBox").classList.add("d-none")
            document.getElementById("quizBox").classList.remove("d-none")

            tampilSoal()

        }

        // TAMPIL SOAL
        function tampilSoal() {

            let soal = soalData[indexSoal]

            document.getElementById("progress").innerText = "Soal " + (indexSoal + 1) + " / " + soalData.length
            document.getElementById("score").innerText = "Benar: " + skorBenar

            let persen = ((indexSoal + 1) / soalData.length) * 100
            document.getElementById("progressBar").style.width = persen + "%"

            document.getElementById("gambarSoal").src = soal.gambar
            document.getElementById("soal").innerText = soal.pertanyaan

            let html = ""

            soal.pilihan.forEach(p => {
                html += `<button class="btn btn-option" onclick="cekJawaban(this,'${p}')">${p}</button>`
            })

            document.getElementById("jawaban").innerHTML = html
            document.getElementById("nextBtn").classList.add("d-none")

        }

        // CEK JAWABAN
        function cekJawaban(btn, pilihan) {

            let semuaBtn = document.querySelectorAll(".btn-option")
            semuaBtn.forEach(b => b.disabled = true)

            if (pilihan === soalData[indexSoal].benar) {

                skorBenar++
                btn.classList.add("correct")
                soundBenar.play()

            } else {

                skorSalah++
                btn.classList.add("wrong")
                soundSalah.play()

                semuaBtn.forEach(b => {
                    if (b.innerText === soalData[indexSoal].benar) {
                        b.classList.add("correct")
                    }
                })

            }

            document.getElementById("nextBtn").classList.remove("d-none")

        }

        // NEXT
        function nextSoal() {

            indexSoal++

            if (indexSoal < soalData.length) {

                tampilSoal()

            } else {

                tampilHasil()

            }

        }

        // HASIL
        function tampilHasil() {

            document.getElementById("quizBox").classList.add("d-none")
            document.getElementById("hasilBox").classList.remove("d-none")

            document.getElementById("hasilText").innerHTML =
                `<strong>${namaSiswa}</strong> (${kelasSiswa})<br>
Benar: ${skorBenar}<br>
Salah: ${skorSalah}`

            soundFinish.play()

            kirimKeForm()

        }

        // KIRIM GOOGLE FORM
        function kirimKeForm() {

            let formURL = "https://docs.google.com/forms/d/e/1FAIpQLScaXDRA6Sf_9w1n-jJ6r4BLtK6J-UuBGejnsroFDvKIcKcAYg/formResponse"

            let data = new FormData()

            data.append("entry.802697235", namaSiswa)
            data.append("entry.275993981", kelasSiswa)
            data.append("entry.1756706222", skorBenar)
            data.append("entry.128410703", skorSalah)

            fetch(formURL, {
                method: "POST",
                mode: "no-cors",
                body: data
            })

        }

    </script>

</body>

</html>
