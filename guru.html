<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Halaman Guru - Rekap Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 40px;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* CARD */
        .card-custom {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* JUDUL */
        .title-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .title-box h3 {
            margin: 0;
            font-weight: 600;
        }

        .title-line {
            width: 6px;
            height: 30px;
            background: linear-gradient(180deg, #4facfe, #00f2fe);
            border-radius: 4px;
        }

        /* BUTTON */
        .btn-download {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: none;
            color: white;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        /* IFRAME BOX */
        .sheet-box {
            border-radius: 15px;
            overflow: hidden;
            background: white;
            padding: 5px;
        }

        /* RESPONSIVE */
        @media(max-width:768px) {
            body {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card-custom shadow-lg">

            <div class="title-box">
                <div class="title-line"></div>
                <h3>Rekap Hasil Quiz Siswa</h3>
            </div>

            <div class="mb-4">

                <a href="https://docs.google.com/spreadsheets/d/1EURx8zQlIDMSg9Qgipr2BaohM-SpCMt1XCgM0y1S7zk/export?format=pdf"
                    target="_blank" class="btn btn-download">

                    📄 Download Rekap PDF

                </a>

            </div>

            <div class="sheet-box ratio ratio-16x9">

                <iframe
                    src="https://docs.google.com/spreadsheets/d/1EURx8zQlIDMSg9Qgipr2BaohM-SpCMt1XCgM0y1S7zk/preview"
                    width="100%" height="600" frameborder="0">
                </iframe>

            </div>

        </div>

    </div>

</body>

</html>
